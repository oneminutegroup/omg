<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퇴근보고</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  padding: 0;
}

.container {
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  background: white;
  padding: 14px;
}

h2 {
  margin: 0 0 20px 0;
  font-size: 22px;
}

label.main-label {
  display: block;
  font-weight: bold;
  margin-bottom: 8px;
}

select, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-family: Arial, sans-serif;
  font-size: 14px;
}

.section {
  margin-bottom: 26px;
}

.section-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 12px;
}

.room-line {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.room-type {
  width: 70px;
  font-weight: bold;
  font-size: 14px;
}

.room-options {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  gap: 5px 10px;
}

.room-options label {
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
  font-size: 14px;
}

.room-options input {
  width: 16px;
  height: 16px;
  margin: 0;
}

.message-line {
  text-align: center;
  font-size: 14px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

#donePage {
  display: none;
  min-height: 100vh;
  background: white;
  padding: 40px 20px;
  text-align: center;
}

.done-message {
  font-size: 22px;
  font-weight: bold;
  line-height: 1.7;
  white-space: pre-line;
  margin-top: 60px;
}

.inline-select-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  width: 100%;
}

.inline-item {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

.inline-item label {
  font-weight: bold;
  font-size: 16px;
  margin: 0;
  white-space: nowrap;
  min-width: fit-content;
}

.inline-small-select {
  flex: 1;
  width: 100%;
  min-width: 0;
  max-width: 120px;
  padding: 8px 8px;
  margin: 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 13px;
}

.inline-help {
  font-size: 12px;
  color: #666;
  margin-bottom: 18px;
}

.reason-box {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 18px;
  background: #fafafa;
}

.reason-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 12px;
}

.reason-options label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
}

.reason-options input[type="checkbox"] {
  width: 16px;
  height: 16px;
  margin: 0;
}

.small-help {
  font-size: 12px;
  color: #666;
  margin-top: -12px;
  margin-bottom: 18px;
}
</style>
</head>

<body>

<div class="container" id="formPage">

  <h2>퇴근보고</h2>

  <label class="main-label">근로자</label>
  <select id="worker">
    <option value="">선택하세요</option>
    <option>변지훈</option>
    <option>문정국</option>
    <option>신옥재</option>
    <option>정준하</option>
    <option>기타</option>
  </select>

  <div class="section">
    <div class="section-title">체크인 완료 (<span id="checkinDoneCount">0</span>)</div>
    <div id="checkinDone"></div>
  </div>

  <div class="section">
    <div class="section-title">체크인 예정 (<span id="checkinPlannedCount">0</span>)</div>
    <div id="checkinPlanned"></div>
  </div>

  <div class="section">
    <div class="section-title">공실 (<span id="vacantCount">0</span>)</div>
    <div id="vacant"></div>
  </div>

  <div class="section">
    <div class="section-title">노쇼</div>

    <select id="noshowSelect" onchange="toggleNoshow()">
      <option value="" selected>--</option>
      <option value="없음">없음</option>
      <option value="전날노쇼">전날노쇼</option>
      <option value="전전날노쇼">전전날노쇼</option>
    </select>

    <div id="noshowBox" style="display:none;">
      <div id="noshow"></div>
    </div>
  </div>

  <div class="inline-select-row">
    <div class="inline-item">
      <label for="stainCount">이불오염</label>
      <select id="stainCount" class="inline-small-select">
        <option value="" selected>--</option>
        <option value="없음">없음</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
    </div>

    <div class="inline-item">
      <label for="lostItemStatus">분실물</label>
      <select id="lostItemStatus" class="inline-small-select" onchange="handleLostItemChange()">
        <option value="" selected>--</option>
        <option value="없음">없음</option>
        <option value="있음">있음</option>
      </select>
    </div>
  </div>

  <div class="inline-help">- 오염된 이불 따로 빼놓고 인계할것 -</div>

  <div id="lostItemDetailSection" style="display:none;">
    <label class="main-label">분실물 상세내용</label>
    <textarea id="lostItemDetail"></textarea>
  </div>

  <label class="main-label">특이사항</label>
  <textarea id="memo"></textarea>

  <div id="timeReasonSection" style="display:none;">
    <label class="main-label">퇴근시간 변동사유</label>
    <div class="reason-box">
      <div class="reason-options">
        <label><input type="checkbox" id="reasonReportedToBoss"> 사장님 사전보고 완료</label>
        <label><input type="checkbox" id="reasonBossMission"> 사장님 특별미션</label>
        <label><input type="checkbox" id="reasonHeavyCleaning"> 청소 갯수 과다</label>
        <label><input type="checkbox" id="reasonEtc" onchange="handleEtcReasonChange()"> 기타 사유</label>
      </div>
      <textarea id="etcReasonText" style="display:none;"></textarea>
    </div>
  </div>

  <button onclick="submitForm()">퇴근완료</button>

</div>

<script>
const webhookUrl = "https://hook.us2.make.com/0uoafwaj0hqxwks97ankcvkxbtuu99fs";

  "패밀리": ["R3"],
  "더블코너": ["R4"],
  "싱글": ["R5","R6"],
  "미니싱글": ["R7"]
};
</script>

</body>
</html>
