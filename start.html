<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출근보고</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  padding: 0;
}

.container {
  width: 100%;
  max-width: 720px;
  margin: 0 auto; 
  background: white;
  padding: 14px;
}

h2 {
  margin: 0 0 20px 0;
  font-size: 22px;
}

label.main-label {
  display: block;
  font-weight: bold;
  margin-bottom: 8px;
}

select, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.section {
  margin-bottom: 26px;
}

.section-title-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.section-help {
  font-size: 13px;
  color: #666;
}

.section-title {
  font-size: 18px;
  font-weight: bold;
}

.room-line {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.room-type {
  width: 90px;
  font-weight: bold;
  font-size: 14px;
}

.room-options {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  gap: 5px 10px;
}

.room-options label {
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

#donePage {
  display: none;
  min-height: 100vh;
  background: white;
  padding: 40px 20px;
  text-align: center;
}

.done-message {
  font-size: 22px;
  font-weight: bold;
  line-height: 1.7;
  margin-top: 60px;
}
</style>
</head>

<body>

<div class="container" id="formPage">

  <h2>출근보고</h2>

  <label class="main-label">근로자</label>
  <select id="worker">
    <option value="">선택하세요</option>
    <option>이준희</option>
    <option>류정수</option>
    <option>기타</option>
  </select>

  <div class="section">
    <div class="section-title">청소객실 (<span id="cleanCount">0</span>)</div>
    <div id="clean"></div>
  </div>

  <div class="section">
    <div class="section-title-row">
      <div class="section-title">점검객실 (<span id="inspectCount">0</span>)</div>
      <div class="section-help">- 청소는 아닌데, 비어있는 객실을 점검 -</div>
    </div>
    <div id="inspect"></div>
  </div>

  <div class="section">
    <div class="section-title-row">
      <div class="section-title">노쇼</div>
      <div class="section-help">- 어제 도어락 log 확인해서 안 온 게스트 확인 -</div>
    </div>

    <select id="noshowSelect" onchange="toggleNoshow()">
      <option value="" selected>--</option>
      <option value="없음">없음</option>
      <option value="전날노쇼">전날노쇼</option>
      <option value="전전날노쇼">전전날노쇼</option>
    </select>

    <div id="noshowBox" style="display:none;">
      <div id="noshow"></div>
    </div>
  </div>

  <label class="main-label">특이사항</label>
  <textarea id="memo"></textarea>

  <button onclick="submitForm()">출근완료</button>

</div>

<div id="donePage">
  <div class="done-message">출근 완료</div>
</div>

<script>
const webhookUrl = "https://hook.us2.make.com/2y9kz1fqhfr2hl84og54aft1lcligjl5";

const rooms = {
  "더블": ["R1","R2"],
  "패밀리": ["R3"],
  "더블코너": ["R4"],
  "싱글": ["R5","R6"],
  "미니싱글": ["R7"]
};

function createSection(id) {
  const container = document.getElementById(id);

  for (let type in rooms) {
    const line = document.createElement("div");
    line.className = "room-line";

    const t = document.createElement("div");
    t.className = "room-type";
    t.innerText = type;

    const opt = document.createElement("div");
    opt.className = "room-options";

    rooms[type].forEach(r => {
      const label = document.createElement("label");

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.value = r;
      cb.name = id;
      cb.onchange = updateCount;

      label.appendChild(cb);
      label.append(" " + r);
      opt.appendChild(label);
    });

    line.appendChild(t);
    line.appendChild(opt);
    container.appendChild(line);
  }
}

createSection("clean");
createSection("inspect");
createSection("noshow");

function getChecked(name) {
  return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(e => e.value);
}

function updateCount() {
  document.getElementById("cleanCount").innerText = getChecked("clean").length;
  document.getElementById("inspectCount").innerText = getChecked("inspect").length;
}

function toggleNoshow() {
  const val = document.getElementById("noshowSelect").value;
  const box = document.getElementById("noshowBox");

  if (val === "전날노쇼" || val === "전전날노쇼") {
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}

async function submitForm() {
  const worker = document.getElementById("worker").value;
  const clean = getChecked("clean");
  const inspect = getChecked("inspect");
  const noshowMode = document.getElementById("noshowSelect").value;
  const memo = document.getElementById("memo").value.trim();

  if (!worker) {
    alert("근로자를 선택하세요.");
    return;
  }

  const payload = {
    worker,
    clean,
    inspect,
    noshowMode,
    memo
  };

  await fetch(webhookUrl, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  document.getElementById("formPage").style.display = "none";
  document.getElementById("donePage").style.display = "block";
}
</script>

</body>
</html>
