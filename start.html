<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출근보고</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f6fa;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  background: white;
  padding: 14px;
}

h2 {
  margin-bottom: 20px;
}

label.main-label {
  font-weight: bold;
}

select, textarea {
  width: 100%;
  padding: 12px;
  margin: 12px 0 20px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.section {
  margin-bottom: 24px;
}

.section-title-row {
  display: flex;
  gap: 8px;
  align-items: baseline;
}

.section-help {
  font-size: 12px;
  color: #666;
}

.room-line {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.room-type {
  width: 90px;
  font-weight: bold;
}

.room-options {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.reason-box {
  border: 1px solid #ddd;
  padding: 10px;
  border-radius: 10px;
  background: #fafafa;
}

button {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

<h2>출근보고</h2>

<label class="main-label">근로자</label>
<select id="worker">
  <option value="">선택하세요</option>
  <option>이준희</option>
  <option>류정수</option>
  <option>기타</option>
</select>

<div class="section">
  <div class="section-title-row">
    <div><b>청소객실</b> (<span id="cleanCount">0</span>)</div>
  </div>
  <div id="clean"></div>
</div>

<div class="section">
  <div class="section-title-row">
    <div><b>점검객실</b> (<span id="inspectCount">0</span>)</div>
    <div class="section-help">- 청소는 아닌데, 비어있는 객실을 점검 -</div>
  </div>
  <div id="inspect"></div>
</div>

<div class="section">
  <div class="section-title-row">
    <div><b>노쇼</b></div>
    <div class="section-help">- 어제 도어락 log 확인해서 안 온 게스트 확인 -</div>
  </div>

  <select id="noshowSelect">
    <option value="">--</option>
    <option>없음</option>
    <option>전날노쇼</option>
    <option>전전날노쇼</option>
  </select>
</div>

<label class="main-label">특이사항</label>
<textarea id="memo"></textarea>

<div id="timeReasonSection" style="display:none;">
  <label class="main-label">출근시간 변동사유</label>

  <div class="reason-box">
    <label><input type="checkbox" id="reason1"> 사장님 사전보고 완료</label><br>
    <label><input type="checkbox" id="reason2"> 사장님 특별미션</label><br>
    <label><input type="checkbox" id="reason3"> 청소 갯수 과다</label><br>
    <label><input type="checkbox" id="reason4" onchange="toggleEtc()"> 기타 사유</label>

    <textarea id="etcText" style="display:none;" placeholder="기타 사유 입력"></textarea>
  </div>
</div>

<button onclick="submitForm()">출근완료</button>

</div>

<script>

const webhookUrl = "https://hook.us2.make.com/0uoafwaj0hqxwks97ankcvkxbtuu99fs";

const rooms = {
  "더블": ["R1","R2"],
  "패밀리": ["R3"],
  "더블코너": ["R4"],
  "싱글": ["R5","R6"],
  "미니싱글": ["R7"]
};

function createSection(id) {
  const container = document.getElementById(id);

  for (let type in rooms) {
    const line = document.createElement("div");
    line.className = "room-line";

    const t = document.createElement("div");
    t.className = "room-type";
    t.innerText = type;

    const opt = document.createElement("div");
    opt.className = "room-options";

    rooms[type].forEach(r => {
      const label = document.createElement("label");
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.name = id;
      cb.value = r;
      cb.onchange = updateCount;

      label.appendChild(cb);
      label.append(" " + r);
      opt.appendChild(label);
    });

    line.appendChild(t);
    line.appendChild(opt);
    container.appendChild(line);
  }
}

createSection("clean");
createSection("inspect");

function getChecked(name) {
  return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(e => e.value);
}

function updateCount() {
  document.getElementById("cleanCount").innerText = getChecked("clean").length;
  document.getElementById("inspectCount").innerText = getChecked("inspect").length;
}

function toggleEtc() {
  document.getElementById("etcText").style.display =
    document.getElementById("reason4").checked ? "block" : "none";
}

function getDiffMinutes() {
  const now = new Date();
  const standard = new Date();
  standard.setHours(9,0,0);
  return Math.abs((now - standard) / 60000);
}

async function submitForm() {

  const worker = document.getElementById("worker").value;
  const clean = getChecked("clean");
  const inspect = getChecked("inspect");
  const noshow = document.getElementById("noshowSelect").value;
  const memo = document.getElementById("memo").value;

  if (!worker) {
    alert("근로자 선택");
    return;
  }

  const diff = getDiffMinutes();

  if (diff >= 40) {
    const section = document.getElementById("timeReasonSection");

    if (section.style.display !== "block") {
      alert("출근시간 40분 이상 변동. 사유 선택 필요");
      section.style.display = "block";
      return;
    }

    if (!reason1.checked && !reason2.checked && !reason3.checked && !reason4.checked) {
      alert("사유 선택하세요");
      return;
    }

    if (reason4.checked && !etcText.value.trim()) {
      alert("기타 사유 입력하세요");
      return;
    }
  }

  const payload = {
    worker,
    clean,
    inspect,
    noshow,
    memo
  };

  try {
    await fetch(webhookUrl, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    alert("제출완료");

  } catch (e) {
    alert("전송실패");
  }
}
</script>

</body>
</html>
